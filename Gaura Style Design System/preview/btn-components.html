<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--bg); font-family: var(--font-sans); }
  .group { margin-bottom: 22px; }
  .group:last-child { margin-bottom: 0; }
  .label { font-size: 9px; font-weight: 600; letter-spacing: 0.18em; color: var(--fg3); text-transform: uppercase; margin: 0 0 12px; font-family: var(--font-mono); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }

  /* Primary — Gold fill, asymmetric underline flourish */
  .btn {
    position: relative; display: inline-flex; align-items: center; justify-content: center;
    gap: 12px; padding: 0 28px; height: 48px;
    font-family: var(--font-sans); font-size: 11px; font-weight: 600;
    letter-spacing: 0.22em; text-transform: uppercase;
    border: none; cursor: pointer; text-decoration: none; white-space: nowrap;
    transition: all 280ms cubic-bezier(0.25, 0.1, 0.25, 1);
    border-radius: 0; /* sharp, editorial */
  }
  .btn .arrow {
    display: inline-block; width: 18px; height: 1px; background: currentColor;
    position: relative; transition: width 280ms ease, transform 280ms ease;
  }
  .btn .arrow::after {
    content: ''; position: absolute; right: -1px; top: -3px;
    width: 7px; height: 7px; border-right: 1px solid currentColor; border-top: 1px solid currentColor;
    transform: rotate(45deg);
  }
  .btn:hover .arrow { width: 28px; }

  /* Primary — filled gold on brown */
  .btn-primary {
    background: var(--gold); color: var(--brown-dark);
    box-shadow: 0 1px 0 var(--brown-dark); /* hairline base */
  }
  .btn-primary:hover { background: var(--gold-hover); transform: translateY(-1px); box-shadow: 0 2px 0 var(--brown-dark); }

  /* Editorial — underlined serif label, no box */
  .btn-editorial {
    padding: 6px 0; height: auto;
    font-family: var(--font-display); font-size: 18px; font-weight: 400; font-style: italic;
    text-transform: none; letter-spacing: 0; color: var(--fg1);
    background: transparent; border-bottom: 1px solid var(--fg1);
  }
  .btn-editorial:hover { color: var(--brown); border-bottom-color: var(--brown); }

  /* Inverse — dark with gold arrow */
  .btn-dark { background: var(--fg1); color: var(--fg-inverse); }
  .btn-dark .arrow, .btn-dark .arrow::after { border-color: var(--gold); background: var(--gold); }
  .btn-dark .arrow::after { background: transparent; }
  .btn-dark:hover { background: #2A2420; }

  /* Ghost — hairline rule, fills on hover */
  .btn-ghost {
    background: transparent; color: var(--fg1);
    border: 1px solid var(--fg1);
  }
  .btn-ghost:hover { background: var(--fg1); color: var(--fg-inverse); }

  /* Gold hairline — minimal luxury */
  .btn-hairline {
    background: transparent; color: var(--brown-dark);
    border-top: 1px solid var(--brown); border-bottom: 1px solid var(--brown);
    padding: 0 22px;
  }
  .btn-hairline:hover { background: var(--gold-subtle); }

  /* Icon button — circular */
  .btn-icon {
    width: 48px; height: 48px; padding: 0; border-radius: 50%;
    background: var(--surface); color: var(--fg1); border: 1px solid var(--border-strong);
  }
  .btn-icon:hover { background: var(--fg1); color: var(--fg-inverse); border-color: var(--fg1); }

  /* Sizes */
  .btn-sm { height: 36px; padding: 0 18px; font-size: 10px; letter-spacing: 0.2em; }
  .btn-lg { height: 56px; padding: 0 36px; font-size: 12px; letter-spacing: 0.24em; }

  /* Split CTA — two linked actions with a gold hairline divider */
  .btn-split { display: inline-flex; }
  .btn-split .btn { border-radius: 0; padding: 0 24px; }
  .btn-split .btn:first-child { background: var(--fg1); color: var(--fg-inverse); border-right: 1px solid var(--gold); }
  .btn-split .btn:last-child { background: var(--gold); color: var(--brown-dark); padding: 0 18px; width: 48px; }

  /* Disabled */
  .btn-disabled { opacity: 0.28; pointer-events: none; filter: saturate(0.3); }

  .tag { font-size: 9px; color: var(--fg3); font-family: var(--font-mono); margin-top: 8px; text-align: center; letter-spacing: 0.06em; }
  .item { display: flex; flex-direction: column; align-items: center; }
</style>
</head><body>

<div class="group">
  <div class="label">Primary · Editorial · Inverse</div>
  <div class="row">
    <div class="item">
      <button class="btn btn-primary">Shop the Collection<span class="arrow"></span></button>
      <div class="tag">primary · gold</div>
    </div>
    <div class="item">
      <button class="btn btn-editorial">Discover the story</button>
      <div class="tag">editorial · serif</div>
    </div>
    <div class="item">
      <button class="btn btn-dark">Add to Selection<span class="arrow"></span></button>
      <div class="tag">inverse · dark</div>
    </div>
  </div>
</div>

<div class="group">
  <div class="label">Ghost · Hairline · Icon · Split</div>
  <div class="row">
    <div class="item">
      <button class="btn btn-ghost">Request a Consultation</button>
      <div class="tag">ghost</div>
    </div>
    <div class="item">
      <button class="btn btn-hairline">View Details</button>
      <div class="tag">hairline</div>
    </div>
    <div class="item">
      <button class="btn btn-icon" aria-label="Add to wishlist">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
      <div class="tag">icon</div>
    </div>
    <div class="item">
      <div class="btn-split">
        <button class="btn">Add to Bag</button>
        <button class="btn" aria-label="Quick buy">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div class="tag">split</div>
    </div>
  </div>
</div>

<div class="group">
  <div class="label">Sizes · States</div>
  <div class="row" style="align-items:flex-end">
    <div class="item"><button class="btn btn-primary btn-sm">Small<span class="arrow"></span></button><div class="tag">sm · 36</div></div>
    <div class="item"><button class="btn btn-primary">Default<span class="arrow"></span></button><div class="tag">md · 48</div></div>
    <div class="item"><button class="btn btn-primary btn-lg">Large<span class="arrow"></span></button><div class="tag">lg · 56</div></div>
    <div class="item"><button class="btn btn-primary btn-disabled">Sold Out<span class="arrow"></span></button><div class="tag">disabled</div></div>
  </div>
</div>

</body></html>
