<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg); }
  .specimen { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .specimen:last-child { border-bottom: none; margin-bottom: 0; }
  .meta { font-family: var(--font-mono); font-size: 9px; color: var(--fg3); letter-spacing: 0.08em; margin-bottom: 4px; text-transform: uppercase; }
</style>
</head><body>
<div class="specimen">
  <div class="meta">Display / 96px / Light 300</div>
  <div style="font-family:var(--font-display);font-size:72px;font-weight:300;line-height:1.05;letter-spacing:-0.02em;color:var(--fg1)">Gaura Style</div>
</div>
<div class="specimen">
  <div class="meta">Headline / 56px / Light</div>
  <div style="font-family:var(--font-display);font-size:46px;font-weight:300;line-height:1.1;letter-spacing:-0.01em;color:var(--fg1)">Designed to be worn.</div>
</div>
<div class="specimen">
  <div class="meta">Subheading / 32px / Regular Italic</div>
  <div style="font-family:var(--font-display);font-size:28px;font-weight:400;font-style:italic;line-height:1.25;color:var(--brown)">Beauty for a Cause</div>
</div>
<div class="specimen">
  <div class="meta">Section Title / 24px / Regular</div>
  <div style="font-family:var(--font-display);font-size:22px;font-weight:400;line-height:1.3;color:var(--fg1)">Our Collections</div>
</div>
</body></html>
