<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg); font-family: var(--font-sans); }
  .grid { display: flex; gap: 16px; }
  .card { background: var(--surface); border-radius: var(--radius-sm); overflow: hidden; box-shadow: var(--shadow-sm); width: 180px; flex-shrink: 0; transition: box-shadow var(--dur-base) var(--ease-out); }
  .card:hover { box-shadow: var(--shadow-md); }
  .card-img { width: 100%; aspect-ratio: 1; background: var(--surface-warm); display: flex; align-items: center; justify-content: center; position: relative; }
  .card-img .placeholder { font-family: var(--font-display); font-size: 13px; font-style: italic; color: var(--fg3); letter-spacing: 0.04em; }
  .badge { position: absolute; top: 10px; left: 10px; background: var(--gold); color: var(--brown-dark); font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 8px; border-radius: var(--radius-xs); }
  .card-body { padding: 12px 14px 14px; }
  .card-collection { font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg3); margin-bottom: 4px; }
  .card-name { font-family: var(--font-display); font-size: 16px; font-weight: 400; color: var(--fg1); margin: 0 0 4px; line-height: 1.2; }
  .card-price { font-size: 14px; font-weight: 500; color: var(--fg1); }
  .card-price-old { font-size: 12px; color: var(--fg3); text-decoration: line-through; margin-left: 6px; }
  .wishlist { position: absolute; top: 10px; right: 10px; width: 28px; height: 28px; background: rgba(255,255,255,0.85); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--fg2); cursor: pointer; }
</style>
</head><body>
<div class="grid">
  <div class="card">
    <div class="card-img">
      <span class="placeholder">Ring photo</span>
      <div class="badge">New</div>
      <div class="wishlist">♡</div>
    </div>
    <div class="card-body">
      <div class="card-collection">Gold Collection</div>
      <div class="card-name">Soleil Band</div>
      <div><span class="card-price">$285</span></div>
    </div>
  </div>
  <div class="card">
    <div class="card-img" style="background:#F0E8DA">
      <span class="placeholder">Ring photo</span>
      <div class="wishlist" style="color:#C0392B">♥</div>
    </div>
    <div class="card-body">
      <div class="card-collection">Diamond</div>
      <div class="card-name">Aurora Solitaire</div>
      <div><span class="card-price">$640</span><span class="card-price-old">$800</span></div>
    </div>
  </div>
  <div class="card">
    <div class="card-img" style="background:#E8E3DA">
      <span class="placeholder">Ring photo</span>
      <div class="badge" style="background:var(--fg1);color:var(--fg-inverse)">Sold Out</div>
    </div>
    <div class="card-body">
      <div class="card-collection">Silver</div>
      <div class="card-name">Luna Stack</div>
      <div><span class="card-price" style="color:var(--fg3)">$195</span></div>
    </div>
  </div>
</div>
</body></html>
