<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-sans); background: var(--bg); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .lockup { border-radius: var(--radius-sm); padding: 24px 32px; display: flex; align-items: center; justify-content: center; min-height: 88px; }
  .lockup img { max-height: 32px; width: auto; }
  .lockup-light { background: var(--surface); border: 1px solid var(--border); }
  .lockup-warm { background: var(--surface-warm); border: 1px solid var(--border); }
  .lockup-dark { background: var(--surface-dark); }
  .lockup-gold { background: var(--gold); }
  .label { font-size: 9px; color: var(--fg3); font-family: var(--font-mono); letter-spacing: 0.08em; margin-top: 5px; text-align: center; }
  .item { }
</style>
</head><body>
<div class="grid">
  <div class="item">
    <div class="lockup lockup-light"><img src="../assets/logo-brown.webp" alt="Gaura Style"></div>
    <div class="label">On white — primary</div>
  </div>
  <div class="item">
    <div class="lockup lockup-warm"><img src="../assets/logo-brown.webp" alt="Gaura Style"></div>
    <div class="label">On warm surface</div>
  </div>
  <div class="item">
    <div class="lockup lockup-dark"><img src="../assets/logo-brown.webp" alt="Gaura Style" style="filter:brightness(0) invert(1)"></div>
    <div class="label">On dark — inverted</div>
  </div>
  <div class="item">
    <div class="lockup lockup-gold"><img src="../assets/logo-brown.webp" alt="Gaura Style" style="filter:brightness(0)"></div>
    <div class="label">On gold — black</div>
  </div>
</div>
</body></html>
